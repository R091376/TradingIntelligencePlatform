# Profile: memory — run without PostgreSQL (watchlist is process-local).
#
#   mvn spring-boot:run -Dspring-boot.run.profiles=memory
#   java -jar app.jar --spring.profiles.active=memory
#   TIP_WATCHLIST_STORE=memory   (also works via EnvironmentPostProcessor)

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.transaction.TransactionAutoConfiguration
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

tip:
  watchlist:
    store: memory
